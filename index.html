<script>
        const FIREBASE_URL = "https://swapnatari-svyo-default-rtdb.firebaseio.com/";
        const DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        let db_members = [];
        let db_donors = [];
        let db_pending = [];
        let db_pending_donors = [];
        let db_posts = [];
        let system_notice = "কোনো নোটিশ আপলোড করা হয়নি।";
        let isAdminAuthenticated = false;

        window.addEventListener("DOMContentLoaded", () => {
            fetchLiveDatabase();
            setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); }, 1500);
        });

        // 🔄 লাইভ ডাটাবেজ সিঙ্ক ও কিউ ম্যাপিং
        async function fetchLiveDatabase() {
            try {
                const res = await fetch(`${FIREBASE_URL}.json`);
                const data = await res.json();
                
                if (data) {
                    db_members = data.live_members ? Object.keys(data.live_members).map(k => ({...data.live_members[k], id: k})) : [];
                    db_donors = data.donors ? Object.keys(data.donors).map(k => ({...data.donors[k], id: k})) : [];
                    
                    db_pending = data.pending_members ? Object.keys(data.pending_members).map(key => ({...data.pending_members[key], _fbKey: key})) : [];
                    db_pending_donors = data.pending_donors ? Object.keys(data.pending_donors).map(key => ({...data.pending_donors[key], _fbKey: key})) : [];
                    
                    db_posts = data.posts ? Object.values(data.posts).sort((a,b) => b.id - a.id) : [];
                    system_notice = data.notice || "স্বপ্নতরী স্বেচ্ছাসেবী যুব সংগঠন (SVYO) পোর্টালে স্বাগতম।";
                } else {
                    db_members = []; db_donors = []; db_pending = []; db_pending_donors = []; db_posts = [];
                }
                
                document.getElementById('stat-members').innerText = db_members.length;
                document.getElementById('stat-blood').innerText = db_donors.length;
                
                loadLiveDatabaseUI();
                renderFeeds();
                searchGlobalDonors();
                if (isAdminAuthenticated) renderAdminDashboard();
                
            } catch (err) {
                console.error("ডাটাবেজ সিঙ্ক ত্রুটি:", err);
            }
        }

        // 🖼️ ইমেজ হ্যান্ডলিং
        function convertImageToBase64(fileInputId) {
            return new Promise((resolve) => {
                const fileInput = document.getElementById(fileInputId);
                if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                    resolve(DEFAULT_AVATAR);
                    return;
                }
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onloadend = function() { resolve(reader.result); };
                reader.onerror = function() { resolve(DEFAULT_AVATAR); };
                reader.readAsDataURL(file);
            });
        }

        function switchScreen(screenId) {
            if (screenId === 'admin' && !isAdminAuthenticated) {
                document.getElementById('panel-mode-selector').value = 'user';
                handlePanelSwitch('admin');
                return;
            }
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const idxMap = { 'home': 0, 'about': 1, 'forms': 2, 'blood': 3 };
            if (idxMap[screenId] !== undefined) document.querySelectorAll('.nav-item')[idxMap[screenId]].classList.add('active');
            window.scrollTo(0, 0);
        }

        function handlePanelSwitch(selectedMode) {
            if (selectedMode === 'admin') {
                if (isAdminAuthenticated) {
                    switchScreen('admin');
                    renderAdminDashboard();
                } else {
                    let secretPass = prompt("🔐 মাস্টার অ্যাডমিন সিকিউরিটি কোড দিন:");
                    if (secretPass === null) { document.getElementById('panel-mode-selector').value = 'user'; return; }
                    let enteredPass = secretPass.trim();

                    if (enteredPass === "9388093") {
                        isAdminAuthenticated = true;
                        document.getElementById('admin-id-tag').classList.add('active');
                        switchScreen('admin');
                        renderAdminDashboard();
                    } else {
                        alert("❌ ভুল পাসওয়ার্ড! অ্যাক্সেস রিফিউজড।");
                        document.getElementById('panel-mode-selector').value = 'user';
                    }
                }
            } else {
                switchScreen('home');
            }
        }

        // 📝 মেম্বার পাবলিক রেজিস্ট্রেশন (ফরম সাবমিশন)
        async function handlePublicRegistration(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-member-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "প্রসেসিং হচ্ছে...";

            const imgBase64 = await convertImageToBase64('reg-img-file');
            
            const payload = {
                name: document.getElementById('reg-name').value,
                father: document.getElementById('reg-father').value,
                mother: document.getElementById('reg-mother').value,
                blood: document.getElementById('reg-blood').value,
                nid: document.getElementById('reg-nid').value,
                phone: document.getElementById('reg-phone').value,
                panel: document.getElementById('reg-panel').value,
                role: document.getElementById('reg-role').value,
                image: imgBase64,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(`${FIREBASE_URL}pending_members.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("🎉 আপনার মেম্বারশিপ আবেদনটি পেন্ডিং কিউতে সফলভাবে জমা হয়েছে!");
                    document.getElementById('main-member-form').reset();
                    fetchLiveDatabase();
                    switchScreen('home');
                } else {
                    alert("❌ সার্ভার এরর! আবার চেষ্টা করুন।");
                }
            } catch (err) {
                console.error(err);
                alert("❌ নেটওয়ার্ক এরর! ফায়ারবেজ কানেকশন চেক করুন।");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "আবেদনপত্র সাবমিট করুন";
            }
        }

        // 🩸 রক্তদাতা রেজিস্ট্রেশন (ফরম সাবমিশন)
        async function handleDonorRegistration(e) {
            e.preventDefault();
            const imgBase64 = await convertImageToBase64('don-img-file');

            const payload = {
                name: document.getElementById('don-name').value,
                blood: document.getElementById('don-blood').value,
                phone: document.getElementById('don-phone').value,
                district: document.getElementById('don-dist').value,
                image: imgBase64,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(`${FIREBASE_URL}pending_donors.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("🩸 রক্তদাতা তালিকায় যুক্ত হওয়ার আবেদন সফলভাবে পেন্ডিং কিউতে জমা হয়েছে!");
                    document.getElementById('main-donor-form').reset();
                    fetchLiveDatabase();
                } else {
                    alert("❌ আবেদন ব্যর্থ হয়েছে।");
                }
            } catch (err) {
                console.error(err);
                alert("❌ কানেকশন ত্রুটি।");
            }
        }

        // 📢 নোটিশ ও ফিড রেন্ডারিং
        function renderFeeds() {
            document.getElementById('live-marquee-notice').innerText = system_notice;
            document.getElementById('notice-board-feed').innerText = system_notice;
        }

        function toggleDonorForm(show) {
            document.getElementById('donor-register-zone').style.display = show ? 'block' : 'none';
            document.getElementById('donor-search-zone').style.display = show ? 'none' : 'block';
        }

        // 🔍 রক্তদাতা সার্চ লজিক
        function searchGlobalDonors() {
            const bloodFilter = document.getElementById('search-blood').value.toUpperCase();
            const areaFilter = document.getElementById('search-district').value.toLowerCase();
            const resultsBox = document.getElementById('global-donors-results');
            
            if(!resultsBox) return;
            resultsBox.innerHTML = "";

            const filtered = db_donors.filter(d => {
                const matchesBlood = bloodFilter === "" || d.blood.toUpperCase() === bloodFilter;
                const matchesArea = areaFilter === "" || d.district.toLowerCase().includes(areaFilter);
                return matchesBlood && matchesArea;
            });

            if(filtered.length === 0) {
                resultsBox.innerHTML = "<div class='card' style='grid-column:1/-1; text-align:center;'>কোনো রক্তদাতা পাওয়া যায়নি।</div>";
                return;
            }

            filtered.forEach(d => {
                resultsBox.innerHTML += `
                    <div class="donor-card card">
                        <img src="${d.image || DEFAULT_AVATAR}" class="table-avatar" style="width:50px; height:50px;">
                        <div>
                            <div style="font-weight:700;">${d.name}</div>
                            <div style="font-size:11px; color:var(--text-muted); margin:3px 0;"><i class="fas fa-map-marker-alt"></i> ${d.district}</div>
                            <a href="tel:${d.phone}" class="btn btn-success" style="padding:4px 10px; font-size:10px; margin-top:5px;"><i class="fas fa-phone"></i> কল করুন</a>
                        </div>
                        <span class="donor-blood-tag">${d.blood}</span>
                    </div>
                `;
            });
        }

        // 👥 পর্ষদ ভিত্তিক ইউজার ইন্টারফেস লোড
        function loadLiveDatabaseUI() {
            const panels = { Founder: [], Advisory: [], Executive: [], General: [] };
            db_members.forEach(m => { if(panels[m.panel]) panels[m.panel].push(m); });

            const renderContainer = (id, list) => {
                const box = document.getElementById(id);
                if(!box) return;
                box.innerHTML = list.length === 0 ? "<div style='color:var(--text-muted); font-size:12px;'>এই পর্ষদে কোনো সদস্য নেই।</div>" : "";
                list.forEach(m => {
                    box.innerHTML += `
                        <div class="roster-card">
                            <img src="${m.image || DEFAULT_AVATAR}" class="roster-avatar">
                            <div class="roster-name">${m.name}</div>
                            <div class="roster-designation">${m.role}</div>
                        </div>
                    `;
                });
            };

            renderContainer('founder-render-box', panels.Founder);
            renderContainer('advisory-render-box', panels.Advisory);
            renderContainer('executive-render-box', panels.Executive);
            renderContainer('general-render-box', panels.General);

            // মাস্টার টেবিল রেন্ডার
            const tbody = document.getElementById('general-table-body');
            if(tbody) {
                tbody.innerHTML = db_members.length === 0 ? "<tr><td colspan='4' style='text-align:center;'>কোনো ডাটা নেই</td></tr>" : "";
                db_members.forEach(m => {
                    tbody.innerHTML += `
                        <tr>
                            <td><img src="${m.image || DEFAULT_AVATAR}" class="table-avatar"></td>
                            <td><b>${m.name}</b></td>
                            <td>${m.role}</td>
                            <td><span class="badge-table badge-${m.panel.toLowerCase()}">${m.panel}</span></td>
                        </tr>
                    `;
                });
            }
        }

        // 👑 অ্যাডমিন ড্যাশবোর্ড কন্ট্রোল এবং ম্যানেজমেন্ট লজিক
        function renderAdminDashboard() {
            document.getElementById('count-pending-members').innerText = db_pending.length;
            document.getElementById('count-pending-donors').innerText = db_pending_donors.length;

            // ১. পেন্ডিং মেম্বার কিউ রেন্ডার
            const memQueueBox = document.getElementById('admin-pending-list');
            memQueueBox.innerHTML = db_pending.length === 0 ? "<p style='font-size:12px; color:var(--text-muted);'>কোনো পেন্ডিং মেম্বার আবেদন নেই।</p>" : "";
            db_pending.forEach(p => {
                memQueueBox.innerHTML += `
                    <div class="card" style="border: 1px dashed var(--warning); margin-bottom:10px;">
                        <div style="display:flex; gap:12px; align-items:center;">
                            <img src="${p.image || DEFAULT_AVATAR}" class="table-avatar" style="width:45px; height:45px;">
                            <div style="font-size:12px; flex:1;">
                                <strong>${p.name}</strong> (${p.blood})<br>
                                পদবী: ${p.role} | পর্ষদ: ${p.panel}<br>
                                ফোন: ${p.phone} | NID: ${p.nid}
                            </div>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <button class="btn btn-success" style="padding:4px 8px; font-size:10px;" onclick="approveMember('${p._fbKey}')">Approve</button>
                                <button class="btn btn-danger" style="padding:4px 8px; font-size:10px;" onclick="rejectPendingItem('pending_members', '${p._fbKey}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // ২. পেন্ডিং রক্তদাতা কিউ রেন্ডার
            const donQueueBox = document.getElementById('admin-pending-donors-list');
            donQueueBox.innerHTML = db_pending_donors.length === 0 ? "<p style='font-size:12px; color:var(--text-muted);'>কোনো পেন্ডিং রক্তদাতা আবেদন নেই।</p>" : "";
            db_pending_donors.forEach(p => {
                donQueueBox.innerHTML += `
                    <div class="card" style="border: 1px dashed var(--danger); margin-bottom:10px;">
                        <div style="display:flex; gap:12px; align-items:center;">
                            <img src="${p.image || DEFAULT_AVATAR}" class="table-avatar" style="width:45px; height:45px;">
                            <div style="font-size:12px; flex:1;">
                                <strong>${p.name}</strong> (${p.blood})<br>
                                এলাকা: ${p.district} | ফোন: ${p.phone}
                            </div>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <button class="btn btn-success" style="padding:4px 8px; font-size:10px;" onclick="approveDonor('${p._fbKey}')">Approve</button>
                                <button class="btn btn-danger" style="padding:4px 8px; font-size:10px;" onclick="rejectPendingItem('pending_donors', '${p._fbKey}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // ৩. লাইভ মডারেশন মেম্বার লিস্ট
            const liveMemBox = document.getElementById('admin-live-members-list');
            liveMemBox.innerHTML = "";
            db_members.forEach(m => {
                liveMemBox.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05);">
                        <span style="font-size:12px;">${m.name} (${m.role})</span>
                        <button class="btn btn-danger" style="padding:3px 8px; font-size:10px;" onclick="deleteLiveNode('live_members', '${m.id}')"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            });

            // ৪. লাইভ মডারেশন রক্তদাতা লিস্ট
            const liveDonBox = document.getElementById('admin-live-donors-list');
            liveDonBox.innerHTML = "";
            db_donors.forEach(d => {
                liveDonBox.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05);">
                        <span style="font-size:12px;">${d.name} [${d.blood}]</span>
                        <button class="btn btn-danger" style="padding:3px 8px; font-size:10px;" onclick="deleteLiveNode('donors', '${d.id}')"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            });
        }

        // 📢 নোটিশ পাবলিশ ম্যানেজার
        async function publishNotice() {
            const text = document.getElementById('admin-notice-input').value.trim();
            if(!text) return alert("নোটিশ খালি রাখা যাবে না।");
            try {
                await fetch(`${FIREBASE_URL}notice.json`, { method: 'PUT', body: JSON.stringify(text) });
                alert("📢 গ্লোবাল নোটিশ ব্রডকাস্ট লাইভ করা হয়েছে!");
                document.getElementById('admin-notice-input').value = "";
                fetchLiveDatabase();
            } catch(e) { alert("ত্রুটি হয়েছে।"); }
        }

        // ✅ মেম্বারশিপ এপ্রুভাল প্রসেস
        async function approveMember(key) {
            const target = db_pending.find(p => p._fbKey === key);
            if(!target) return;
            const cleanData = { ...target };
            delete cleanData._fbKey;

            try {
                // ১. লাইভ মেম্বার নোডে পুশ
                await fetch(`${FIREBASE_URL}live_members.json`, { method: 'POST', body: JSON.stringify(cleanData) });
                // ২. পেন্ডিং লিস্ট থেকে রিমুভ
                await fetch(`${FIREBASE_URL}pending_members/${key}.json`, { method: 'DELETE' });
                alert("✅ মেম্বার সফলভাবে এপ্রুভ করা হয়েছে!");
                fetchLiveDatabase();
            } catch(e) { alert("এপ্রুভাল ফেইল্ড।"); }
        }

        // ✅ ব্লাড ডোনার এপ্রুভাল প্রসেস
        async function approveDonor(key) {
            const target = db_pending_donors.find(p => p._fbKey === key);
            if(!target) return;
            const cleanData = { ...target };
            delete cleanData._fbKey;

            try {
                await fetch(`${FIREBASE_URL}donors.json`, { method: 'POST', body: JSON.stringify(cleanData) });
                await fetch(`${FIREBASE_URL}pending_donors/${key}.json`, { method: 'DELETE' });
                alert("🩸 রক্তদাতা সফলভাবে ডাটাবেজে এপ্রুভ করা হয়েছে!");
                fetchLiveDatabase();
            } catch(e) { alert("এপ্রুভাল ফেইল্ড।"); }
        }

        // ❌ পেন্ডিং আইটেম রিজেক্ট বা ডিলিট
        async function rejectPendingItem(node, key) {
            if(!confirm("আবেদনটি ডিলিট করতে চান?")) return;
            try {
                await fetch(`${FIREBASE_URL}${node}/${key}.json`, { method: 'DELETE' });
                fetchLiveDatabase();
            } catch(e) { alert("ডিলিট ব্যর্থ হয়েছে।"); }
        }

        // 🗑️ লাইভ ডাটাবেজ নোড ডিলিট (মডারেশন)
        async function deleteLiveNode(node, id) {
            if(!confirm("সদস্যকে ডাটাবেজ থেকে চিরতরে মুছে ফেলতে চান?")) return;
            try {
                await fetch(`${FIREBASE_URL}${node}/${id}.json`, { method: 'DELETE' });
                fetchLiveDatabase();
            } catch(e) { alert("মুছে ফেলা ব্যর্থ হয়েছে।"); }
        }

        // ➕ সরাসরি মেম্বার ইনজেকশন ফরম (অ্যাডমিন মোড)
        function openDirectMemberForm() {
            switchScreen('forms');
            document.getElementById('submit-member-btn').innerText = "সরাসরি লাইভ মেম্বার যুক্ত করুন";
            document.getElementById('main-member-form').onsubmit = async function(e) {
                e.preventDefault();
                const imgBase64 = await convertImageToBase64('reg-img-file');
                const payload = {
                    name: document.getElementById('reg-name').value,
                    father: document.getElementById('reg-father').value,
                    mother: document.getElementById('reg-mother').value,
                    blood: document.getElementById('reg-blood').value,
                    nid: document.getElementById('reg-nid').value,
                    phone: document.getElementById('reg-phone').value,
                    panel: document.getElementById('reg-panel').value,
                    role: document.getElementById('reg-role').value,
                    image: imgBase64,
                    timestamp: new Date().toISOString()
                };
                try {
                    await fetch(`${FIREBASE_URL}live_members.json`, { method: 'POST', body: JSON.stringify(payload) });
                    alert("🎉 সরাসরি লাইভ মেম্বার ডাটাবেজে যুক্ত করা হয়েছে!");
                    document.getElementById('main-member-form').reset();
                    document.getElementById('main-member-form').onsubmit = handlePublicRegistration;
                    document.getElementById('submit-member-btn').innerText = "আবেদনপত্র সাবমিট করুন";
                    fetchLiveDatabase();
                    handlePanelSwitch('admin');
                } catch(err) { alert("ব্যর্থ হয়েছে।"); }
            };
        }
    </script>
</body>
</html>
