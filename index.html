<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বপ্নতরী - স্বেচ্ছাসেবী যুব সংগঠন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার বর্তমান সিএসএস এখানে রাখুন (একই থাকবে) */
    </style>
</head>
<body>

    <header class="app-header">...</header>
    <div class="app-container">
        </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchScreen('home')"><i class="fas fa-home"></i>হোম</div>
        <div class="nav-item" onclick="switchScreen('members')"><i class="fas fa-users"></i>সদস্য</div>
        <div class="nav-item" onclick="switchScreen('admin')"><i class="fas fa-user-shield"></i>অ্যাডমিন</div>
    </nav>

    <script>
        const API_LINK = "https://script.google.com/macros/s/AKfycbwgmsn0Jlilw-SplNZZZYhMm9JH3i0_fBP1OIFuv-it5h7t1lbJxJQw6l5UcAaPuYqa/exec";

        // স্ক্রিন সুইচিং লজিক
        function switchScreen(id) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'active-admin'));
            const navItems = document.querySelectorAll('.nav-item');
            if(id === 'home') navItems[0].classList.add('active');
            if(id === 'members') navItems[1].classList.add('active');
            if(id === 'admin') navItems[2].classList.add('active-admin');
            window.scrollTo(0, 0);
        }

        // ডাটা ফেচিং ইঞ্জিন
        function loadApplicationEngine() {
            // সেটিংস লোড
            fetch(API_LINK + "?type=settings")
                .then(res => res.json())
                .then(d => {
                    if(!d.org_name_bn) return;
                    document.getElementById("app-title-bn").innerText = d.org_name_bn;
                    document.getElementById("hero-title-bn").innerText = d.org_name_bn;
                    document.getElementById("app-slogan").innerText = d.org_slogan;
                    document.getElementById("display-stat1").innerText = d.stat1 || "০";
                    // ... অন্যান্য ফিল্ডগুলো একইভাবে আপডেট করুন
                });

            // সদস্য লোড
            fetch(API_LINK + "?type=members")
                .then(res => res.json())
                .then(m => { /* রেন্ডারিং লজিক */ });

            // ফিড লোড
            fetch(API_LINK + "?type=feeds")
                .then(res => res.json())
                .then(f => { /* নোটিশ ও পোস্ট রেন্ডারিং লজিক */ });
        }

        // পোস্ট অ্যাকশন ফাংশন
        function executePostAction(payload, msg) {
            fetch(API_LINK, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => {
                alert(msg);
                loadApplicationEngine();
            });
        }

        // সব হ্যান্ডলার ফাংশনগুলো এখানে নিচে বসান
        function handleMemberSubmit(e) { e.preventDefault(); /* ... */ }
        
        window.addEventListener('load', loadApplicationEngine);
    </script>
</body>
</html>
