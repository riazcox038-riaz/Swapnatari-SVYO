<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVVO - ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <nav class="bg-emerald-800 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fas fa-ship"></i> স্বপ্নতরী প্যানেল</h1>
        <div id="live-clock" class="text-sm font-mono">Loading...</div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <div class="w-64 bg-white shadow-md p-4 space-y-2">
            <button onclick="render('home')" class="w-full text-left p-3 hover:bg-emerald-100 rounded transition"><i class="fas fa-home"></i> হোম</button>
            <button onclick="render('members')" class="w-full text-left p-3 hover:bg-emerald-100 rounded transition"><i class="fas fa-users"></i> সদস্য তালিকা</button>
            <button onclick="render('finance')" class="w-full text-left p-3 hover:bg-emerald-100 rounded transition"><i class="fas fa-wallet"></i> আয়-ব্যয়</button>
        </div>

        <main id="content" class="flex-1 p-8 overflow-y-auto">
            </main>
    </div>

    <script>
        // Database
        let db = {
            members: [{name: "রিয়াজ", phone: "01811111111"}, {name: "কামরুল", phone: "01722222222"}],
            finance: [{type: "আয়", amount: "500"}]
        };

        function render(view) {
            const content = document.getElementById('content');
            if(view === 'home') {
                content.innerHTML = `<h2 class="text-2xl font-bold mb-4">স্বাগতম!</h2><p>স্বপ্নতরী ম্যানেজমেন্ট সিস্টেমের হোম পেজ।</p>`;
            } 
            else if(view === 'members') {
                content.innerHTML = `<h2 class="text-2xl font-bold mb-4">সদস্য তালিকা</h2>
                    <div class="mb-4 flex gap-2">
                        <input type="text" id="mName" placeholder="সদস্যের নাম" class="border p-2 rounded">
                        <button onclick="addMember()" class="bg-emerald-600 text-white px-4 py-2 rounded">যোগ করুন</button>
                    </div>
                    <table class="w-full bg-white shadow-md rounded">
                        <tr class="bg-gray-200"><th>নাম</th><th>মোবাইল</th></tr>
                        <tbody id="memberList">${db.members.map(m => `<tr><td class="p-2 border">${m.name}</td><td class="p-2 border">${m.phone}</td></tr>`).join('')}</tbody>
                    </table>`;
            }
            else if(view === 'finance') {
                content.innerHTML = `<h2 class="text-2xl font-bold mb-4">আয়-ব্যয় হিসাব</h2>
                    <p class="text-gray-600">বর্তমানে মোট ট্রানজেকশন: ${db.finance.length} টি</p>
                    <button onclick="alert('ভবিষ্যতে এখানে ফর্ম যুক্ত করা হবে')" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">নতুন এন্ট্রি</button>`;
            }
        }

        function addMember() {
            const name = document.getElementById('mName').value;
            if(name) {
                db.members.push({name: name, phone: "নতুন সদস্য"});
                render('members');
            } else {
                alert("নাম লিখুন!");
            }
        }

        // Clock
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('bn-BD');
        }, 1000);

        render('home'); // Init
    </script>
</body>
</html>
